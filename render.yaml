# Render Blueprint: Backend (Docker) + Frontend (Static Site / Vite dist)
# Backend: tenant provisioning uses CREATE DATABASE ... TEMPLATE inside Docker.
# Frontend: publish client/dist only — never client/ source or repo-root dist.

services:
  - type: web
    name: webschool-frontend
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: ./client/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
  - type: web
    name: myschool-backend
    runtime: docker
    rootDir: server
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SCHOOL_LOGO_STORAGE_ROOT
        value: /var/data/myschool/school-logos
      - key: STORAGE_ROOT
        value: /var/data/myschool/storage
    disk:
      name: myschool-uploads
      mountPath: /var/data
      sizeGB: 1
